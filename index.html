<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Time Since</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  color:white;
  font-family:system-ui;
  text-align:center;
}

.container{
  max-width:700px;
}

#time{
  font-size:70px;
  font-weight:700;
  letter-spacing:2px;
}

#event{
  font-size:28px;
  opacity:0.8;
  margin-top:10px;
}

.units{
  font-size:18px;
  opacity:0.6;
}
</style>

</head>

<body>

<div class="container">
  <div id="time">0d 0h 0m 0s</div>
  <div class="units">days hours minutes seconds</div>
  <div id="event">since something</div>
</div>

<script>

function getParams(){
  const params = new URLSearchParams(window.location.search)
  return {
    date: params.get("date"),
    event: params.get("event") || "an event"
  }
}

const {date, event} = getParams()

const startDate = date ? new Date(date) : new Date()

document.getElementById("event").textContent = "since " + event.replaceAll("_"," ")

function update(){

  const now = new Date()
  const diff = now - startDate

  const seconds = Math.floor(diff/1000)

  const days = Math.floor(seconds/86400)
  const hours = Math.floor((seconds%86400)/3600)
  const minutes = Math.floor((seconds%3600)/60)
  const secs = seconds%60

  document.getElementById("time").textContent =
    `${days}d ${hours}h ${minutes}m ${secs}s`
}

update()
setInterval(update,1000)

</script>

</body>
</html>
